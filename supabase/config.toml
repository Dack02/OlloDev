# Ollo Dev — Local Supabase Configuration
project_id = "OlloDev"

[api]
enabled = true
port = 54431
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54432
shadow_port = 54430
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54433
api_url = "http://localhost"

[inbucket]
enabled = true
port = 54434
smtp_port = 54435
pop3_port = 54436

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "50MiB"

[analytics]
enabled = true
port = 54437
backend = "postgres"

[realtime]
enabled = true
